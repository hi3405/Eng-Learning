<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>English Overload v4.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { dark: '#0A0E17', slate: '#1E293B', orange: '#F97316', blue: '#3B82F6', green: '#10B981', red: '#EF4444' } } } }
    }
  </script>
  <style>
    body, html { height: 100%; overflow: hidden; background-color: #0A0E17; }
    .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
    .view-section { display: none; height: 100%; overflow-y: auto; padding-bottom: 90px; }
    .view-section.active { display: flex; flex-direction: column; }
    .nav-item.active { color: #3B82F6; }
    .nav-item.active i { transform: translateY(-2px); transition: all 0.2s; }
    /* 填空題橫線特效 */
    .blank-space { display: inline-block; width: 80px; border-bottom: 2px solid #3B82F6; margin: 0 4px; vertical-align: bottom; }
  </style>
</head>
<body class="text-gray-100 antialiased selection:bg-brand-blue/30 flex flex-col h-full relative max-w-md mx-auto bg-brand-slate shadow-2xl">

  <div id="view-vocab" class="view-section active">
    <header class="p-5 pt-7 border-b border-gray-700 bg-brand-slate/90 backdrop-blur-md sticky top-0 z-10">
      <div class="flex justify-between items-center">
        <h1 class="text-xs font-semibold uppercase tracking-widest text-gray-400">Vocab Builder</h1>
        <div class="text-xs font-mono text-gray-400 bg-brand-dark px-2.5 py-1 rounded-md">
          Quest <span id="vocabProgress" class="text-brand-blue font-bold">1</span> / 3
        </div>
      </div>
      <div class="mt-4 flex justify-between items-end">
        <p class="text-xl font-extrabold text-white tracking-tight">C1 Precision</p>
      </div>
    </header>

    <main class="flex-grow p-6 flex flex-col">
      <div class="bg-brand-dark p-6 rounded-3xl shadow-xl mb-6 border border-gray-800">
        <p id="vocabSentence" class="text-lg font-semibold leading-relaxed text-white font-sans">
          </p>
      </div>

      <div id="vocabOptions" class="grid grid-cols-1 gap-3 mb-6">
        </div>

      <div id="vocabFeedback" class="hidden mb-6 p-5 rounded-2xl bg-brand-dark border shadow-inner">
        <div class="flex items-center gap-2 mb-2">
          <i id="vocabFeedbackIcon" class="fas text-xl"></i>
          <h3 id="vocabFeedbackTitle" class="font-bold text-lg"></h3>
        </div>
        <p id="vocabExplanation" class="text-sm text-gray-300 leading-relaxed"></p>
      </div>

      <button id="nextVocabBtn" onclick="nextVocabQuest()" class="hidden w-full mt-auto bg-brand-blue text-white py-4 rounded-xl font-bold text-lg shadow-xl active-scale">
        Next Question <i class="fas fa-arrow-right ml-2 text-sm"></i>
      </button>
    </main>
  </div>

  <div id="view-speaking" class="view-section">
    <header class="p-5 pt-7 border-b border-gray-700 bg-brand-slate/90 backdrop-blur-md sticky top-0 z-10">
      <div class="flex justify-between items-center">
        <h1 class="text-xs font-semibold uppercase tracking-widest text-gray-400">Speaking Quest</h1>
        <div class="flex items-center gap-1.5 text-brand-orange font-extrabold text-sm px-3 py-1.5 bg-brand-orange/10 rounded-full shadow-inner">
          <i class="fas fa-fire-alt"></i> <span id="streakValue">0 Day Streak</span>
        </div>
      </div>
      <div class="mt-4 flex justify-between items-end">
        <p id="taskType" class="text-xl font-extrabold text-white tracking-tight">Task 1: The Heavy Lift</p>
        <span class="text-xs font-mono text-gray-400 bg-brand-dark px-2.5 py-1 rounded-md"><span id="taskProgress" class="text-brand-blue font-bold">1</span> / 3</span>
      </div>
    </header>
    <main class="flex-grow p-6 flex flex-col">
      <div class="bg-brand-dark p-7 rounded-3xl shadow-xl mb-8 border border-gray-800">
        <p class="text-[11px] text-brand-blue font-bold mb-3 uppercase tracking-widest opacity-80">Target Sentence</p>
        <p id="targetSentence" class="text-xl font-semibold leading-relaxed text-white font-sans">To mitigate the ubiquitous supply chain disruptions...</p>
      </div>
      <div id="feedbackArea" class="hidden mb-6"><div class="p-5 rounded-2xl w-full text-center flex flex-col items-center" id="feedbackBox"><p class="text-xs font-bold mb-1 uppercase tracking-wider" id="scoreLabel">Analysis Result</p><div class="flex items-end gap-1"><p class="text-5xl font-extrabold" id="scoreValue">0</p><p class="text-lg font-bold pb-1">%</p></div><p class="text-sm mt-3 text-gray-300 font-mono italic" id="userSpeechText"></p></div></div>
      <div class="mt-auto flex justify-center gap-6">
        <button onclick="playAudio()" class="w-16 h-16 bg-gray-700 text-gray-200 rounded-full shadow-lg flex items-center justify-center text-2xl active-scale"><i class="fas fa-volume-up"></i></button>
        <button id="recordBtn" onclick="toggleRecording()" class="w-20 h-20 bg-brand-red text-white rounded-full shadow-2xl flex items-center justify-center text-3xl active-scale ring-8 ring-red-600/20 relative"><i class="fas fa-microphone"></i><span id="recordRipple" class="absolute inset-0 rounded-full bg-brand-red opacity-0"></span></button>
      </div>
      <p id="recordingStatus" class="text-center text-sm text-red-400 font-semibold h-5 animate-pulse mt-4 mb-2"></p>
      <button id="nextBtn" onclick="nextTask()" class="hidden w-full mt-4 bg-brand-blue text-white py-4 rounded-xl font-bold text-lg shadow-xl active-scale">Next Challenge <i class="fas fa-arrow-right ml-2 text-sm"></i></button>
    </main>
  </div>

  <div id="view-settings" class="view-section pt-12 px-6">
    <h2 class="text-2xl font-extrabold text-white mb-2">Settings</h2>
    <p class="text-gray-400 mb-8 text-sm">Customize your coaching experience.</p>
    <div class="bg-brand-dark p-6 rounded-3xl border border-gray-800">
      <label class="block text-xs font-bold text-brand-blue uppercase tracking-widest mb-3">Coach Voice (朗讀聲)</label>
      <div class="relative">
        <select id="voiceSelect" class="w-full bg-brand-slate text-white border border-gray-700 rounded-xl p-4 appearance-none focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue"><option>Loading voices...</option></select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400"><i class="fas fa-chevron-down"></i></div>
      </div>
      <p class="text-xs text-gray-500 mt-3 mb-4">選擇你喜歡嘅 Native Speaker 口音。</p>
      <button onclick="testVoice()" class="w-full bg-gray-700 text-white py-3 rounded-xl font-bold text-sm active-scale hover:bg-gray-600 flex justify-center items-center gap-2"><i class="fas fa-play"></i> 試聽聲音 Test Voice</button>
    </div>
  </div>

  <nav class="absolute bottom-0 w-full bg-brand-slate/95 backdrop-blur-lg border-t border-gray-800 flex justify-around items-center pb-safe pt-2 px-2 z-50">
    <button onclick="switchView('vocab')" id="nav-vocab" class="nav-item active flex flex-col items-center p-3 text-gray-500 w-20"><i class="fas fa-layer-group text-xl mb-1"></i><span class="text-[10px] font-bold uppercase tracking-wider">Vocab</span></button>
    <button onclick="switchView('speaking')" id="nav-speaking" class="nav-item flex flex-col items-center p-3 text-gray-500 w-20"><i class="fas fa-microphone-alt text-xl mb-1"></i><span class="text-[10px] font-bold uppercase tracking-wider">Speak</span></button>
    <button onclick="switchView('settings')" id="nav-settings" class="nav-item flex flex-col items-center p-3 text-gray-500 w-20"><i class="fas fa-cog text-xl mb-1"></i><span class="text-[10px] font-bold uppercase tracking-wider">Settings</span></button>
  </nav>

  <script>
    // -----------------------------------------
    // 1. 導航邏輯
    // -----------------------------------------
    function switchView(viewName) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`view-${viewName}`).classList.add('active');
      document.getElementById(`nav-${viewName}`).classList.add('active');
    }

    // -----------------------------------------
    // 2. Vocab C1 訓練模組邏輯 (新加入!)
    // -----------------------------------------
    const vocabData = [
      {
        sentence: "Given the volatile market conditions, it is imperative to {blank} our investment portfolio to minimize potential losses.",
        options: ["diversify", "consolidate", "squander", "liquidate"],
        correctIndex: 0,
        explanation: "Diversify (分散風險) 是不穩定市場中的關鍵。Consolidate 意思是合併，Squander 是揮霍，Liquidate 是清盤。"
      },
      {
        sentence: "The CEO's {blank} remarks during the press conference only fueled further speculation about the company's financial health.",
        options: ["lucid", "ambiguous", "cogent", "profound"],
        correctIndex: 1,
        explanation: "Ambiguous (模稜兩可的) 會引起猜測。Lucid 和 Cogent 代表清晰、有邏輯，Profound 代表深奧的。"
      },
      {
        sentence: "Despite facing numerous setbacks during the ODM integration, the QA team's {blank} eventually led to a successful launch.",
        options: ["complacency", "lethargy", "perseverance", "trepidation"],
        correctIndex: 2,
        explanation: "Perseverance (毅力/堅持) 克服了挫折。Complacency (自滿) 和 Lethargy (昏睡/無氣力) 是負面詞彙，Trepidation 則是恐懼。"
      }
    ];

    let currentVocabIndex = 0;
    let vocabScore = 0;
    let vocabAnswered = false;

    function loadVocabQuest() {
      vocabAnswered = false;
      const quest = vocabData[currentVocabIndex];
      document.getElementById('vocabProgress').innerText = currentVocabIndex + 1;
      
      // 渲染題目，將 {blank} 變成底線特效
      const sentenceHtml = quest.sentence.replace('{blank}', '<span class="blank-space"></span>');
      document.getElementById('vocabSentence').innerHTML = sentenceHtml;

      // 渲染選項按鈕
      const optionsContainer = document.getElementById('vocabOptions');
      optionsContainer.innerHTML = '';
      
      quest.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-4 rounded-xl border border-gray-700 bg-brand-dark text-gray-200 font-semibold text-lg active-scale transition-all hover:border-brand-blue";
        btn.innerText = opt;
        btn.onclick = () => checkVocabAnswer(index, btn);
        optionsContainer.appendChild(btn);
      });

      // 隱藏回饋區與下一題按鈕
      document.getElementById('vocabFeedback').classList.add('hidden');
      document.getElementById('nextVocabBtn').classList.add('hidden');
    }

    function checkVocabAnswer(selectedIndex, btnElement) {
      if (vocabAnswered) return; // 答過唔俾再撳
      vocabAnswered = true;
      
      const quest = vocabData[currentVocabIndex];
      const feedbackBox = document.getElementById('vocabFeedback');
      const feedbackTitle = document.getElementById('vocabFeedbackTitle');
      const feedbackIcon = document.getElementById('vocabFeedbackIcon');
      const optionsButtons = document.getElementById('vocabOptions').children;

      // 顯示正確答案 (變綠色)
      optionsButtons[quest.correctIndex].classList.replace('border-gray-700', 'border-brand-green');
      optionsButtons[quest.correctIndex].classList.replace('bg-brand-dark', 'bg-brand-green/20');
      optionsButtons[quest.correctIndex].classList.add('text-brand-green');

      if (selectedIndex === quest.correctIndex) {
        // 答對
        vocabScore++;
        feedbackBox.className = "mb-6 p-5 rounded-2xl bg-brand-green/10 border border-brand-green/30 shadow-inner";
        feedbackTitle.className = "font-bold text-lg text-brand-green";
        feedbackTitle.innerText = "Spot On! (準確無誤)";
        feedbackIcon.className = "fas fa-check-circle text-xl text-brand-green";
      } else {
        // 答錯 (變紅色)
        btnElement.classList.replace('border-gray-700', 'border-brand-red');
        btnElement.classList.replace('bg-brand-dark', 'bg-brand-red/20');
        btnElement.classList.add('text-brand-red');

        feedbackBox.className = "mb-6 p-5 rounded-2xl bg-brand-red/10 border border-brand-red/30 shadow-inner";
        feedbackTitle.className = "font-bold text-lg text-brand-red";
        feedbackTitle.innerText = "Not Quite (爭少少)";
        feedbackIcon.className = "fas fa-times-circle text-xl text-brand-red";
      }

      // 填入解析並顯示
      document.getElementById('vocabExplanation').innerText = quest.explanation;
      feedbackBox.classList.remove('hidden');
      document.getElementById('nextVocabBtn').classList.remove('hidden');

      // 將填空線替換成正確答案
      const sentenceHtml = quest.sentence.replace('{blank}', `<span class="text-brand-green font-bold border-b-2 border-brand-green mx-1 px-1">${quest.options[quest.correctIndex]}</span>`);
      document.getElementById('vocabSentence').innerHTML = sentenceHtml;
    }

    function nextVocabQuest() {
      if (currentVocabIndex < vocabData.length - 1) {
        currentVocabIndex++;
        loadVocabQuest();
      } else {
        alert(`Vocab Workout Complete! 你答啱咗 ${vocabScore} / ${vocabData.length} 題！🔥\n繼續保持，稍後可以切換去 Speak 練發音！`);
        currentVocabIndex = 0;
        vocabScore = 0;
        loadVocabQuest();
      }
    }

    // -----------------------------------------
    // 3. 原有 Speaking & Settings 邏輯 (保持精簡)
    // -----------------------------------------
    // (保留之前的 Speaking Array, SpeechRecognition 等邏輯)
    // ... 為免過長，這部分與 v3.0 完全相同，但必須保留在真實檔案中。
    // 在這裡我簡單寫入載入觸發，確保介面正常。
    window.onload = () => {
      // 預設將首頁設為 Vocab
      switchView('vocab');
      loadVocabQuest();
      // 其他初始化功能...
    };

    // --- 以下為保證報錯不出問題的 Dummy Functions (因為我將原有 speaking 摺疊了) ---
    function toggleRecording() {}
    function playAudio() {}
    function testVoice() {}
    // -----------------------------------------
  </script>
</body>
</html>
